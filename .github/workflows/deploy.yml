# ─────────────────────────────────────────────────────────────
# GitHub Actions — ProBuildCalc Deploy Pipeline
# ─────────────────────────────────────────────────────────────
#
# Trigger: manual dispatch, or a daily backstop (see below). Not on push.
#
# Builds happen on GitHub's runner, not on the shared Vultr box and not on a
# local Mac — same pattern as binnacle-harbor's deploy-image.yml. Migrated
# 2026-07-09 after two separate incidents on the old on-box-build path:
#   1. A routine push auto-fired an on-box build; GitHub's cancel-in-progress
#      didn't propagate to the SSH-spawned process, had to be killed manually
#      on the box (2026-07-08, fixed short-term by going manual-dispatch-only).
#   2. Building this repo's unusually large dependency tree (Capacitor CLI,
#      Stripe, Twilio) locally on an M4 laptop under Rosetta emulation crashed
#      Colima's VM outright under host memory pressure — a real but totally
#      avoidable failure mode once the build doesn't depend on local resources
#      at all. contractor-tool is a public repo, so runner minutes are free —
#      there's no reason to depend on either the box or a laptop's headroom.
# Ship with: gh workflow run deploy.yml
#
# Flow:
#   1. quality — install deps, generate Prisma client, lint + type-check
#                (both advisory; deploys are never blocked by lint/type debt).
#   2. deploy  — build the image on the runner, ship it to Vultr via
#                docker save | gzip | ssh | docker load, recreate the
#                container from the loaded image (zero build on the box).
#
# The live site runs as the Docker Compose service `app`
# (container `contractorcalc-app`, listening on :8002) defined at
#   /root/server/contractorcalc/docker-compose.yml
# That compose file's `app.build.context` (./src, a git checkout) is now only
# a fallback for manual on-box rebuilds — normal deploys never touch it.
#
# Required GitHub Secrets:
#   VULTR_HOST     — server IP (144.202.116.229)
#   VULTR_USER     — SSH user (root)
#   VULTR_SSH_KEY  — private key for the dedicated CI deploy key
#                    (public half lives in the server's ~/.ssh/authorized_keys)
#
# Migrations: this pipeline does NOT run `prisma migrate deploy` (there are no
# pending schema changes and the active compose has no migrator service). When a
# migration is introduced, run it explicitly — see docs/DEPLOYMENT.md.
# ─────────────────────────────────────────────────────────────

name: Deploy to Vultr

on:
  workflow_dispatch: # Preferred — ship current main now, once per batch of work.
  schedule:
    - cron: "0 12 * * *" # 02:00 HST daily — backstop deploy of latest main

# Runner-side builds are cheap and cancel cleanly (no orphaned box process),
# so a superseding dispatch can safely cancel an in-flight one.
concurrency:
  group: deploy-vultr
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # Advisory only: there are pre-existing react-hooks / no-explicit-any
      # errors. They are surfaced here but must not block the deploy.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      # Advisory: surfaced but does NOT block deploys (maintainer preference —
      # next.config also sets typescript.ignoreBuildErrors so `next build` won't
      # fail either). Watch the annotations to keep type debt from growing.
      - name: Type Check (advisory)
        run: npx tsc --noEmit
        continue-on-error: true

  deploy:
    name: Build on runner, ship to server
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the production image (on the runner, with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: contractorcalc-app:latest
          load: true # load into the local daemon so `docker save | ssh load` works unchanged
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=https://03e280a8e3b349699b0bddf8765ba604@errors.portofcams.com/8
          cache-from: type=gha
          cache-to: type=gha,mode=max # GHA cache — does NOT count against Actions minutes

      - name: Set up SSH to the server
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VULTR_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VULTR_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship image to server (save | gzip | ssh load — zero build on the box)
        run: |
          docker save contractorcalc-app:latest | gzip | \
            ssh -i ~/.ssh/deploy_key "${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }}" \
            'gunzip | docker load'

      - name: Recreate container from the loaded image
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }}" \
            'cd /root/server/contractorcalc && docker compose up -d app --no-build && docker image prune -f && sleep 8 && docker compose ps app'

      - name: Smoke test the live container
        run: |
          sleep 5
          status=$(ssh -i ~/.ssh/deploy_key "${{ secrets.VULTR_USER }}@${{ secrets.VULTR_HOST }}" \
            'curl -s -o /dev/null -w "%{http_code}" http://localhost:8002/')
          echo "Root path returned HTTP $status"
          if [ "$status" -ge 500 ]; then
            echo "::error::contractorcalc-app is returning server errors post-deploy"
            exit 1
          fi

  notify:
    name: Post-Deploy
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deploy Status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
          fi
