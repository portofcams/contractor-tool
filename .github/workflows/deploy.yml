# ─────────────────────────────────────────────────────────────
# GitHub Actions — ProBuildCalc Deploy Pipeline
# ─────────────────────────────────────────────────────────────
#
# Trigger: push to `main` (or manual dispatch)
#
# Flow:
#   1. quality — install deps, generate Prisma client, lint + type-check
#                (both advisory; deploys are never blocked by lint/type debt).
#   2. deploy  — SSH to the Vultr server, fast-forward the live build context
#                to `main`, rebuild the Docker image, recreate the container.
#
# The live site runs as the Docker Compose service `app`
# (container `contractorcalc-app`, listening on :8002) defined at
#   /root/server/contractorcalc/docker-compose.yml
# It does NOT run via pm2 or /opt/contractorcalc. The compose build context is
# ./src, which is a git checkout of this repo's `main`.
#
# Required GitHub Secrets:
#   VULTR_HOST     — server IP (144.202.116.229)
#   VULTR_USER     — SSH user (root)
#   VULTR_SSH_KEY  — private key for the dedicated CI deploy key
#                    (public half lives in the server's ~/.ssh/authorized_keys)
#
# Migrations: this pipeline does NOT run `prisma migrate deploy` (there are no
# pending schema changes and the active compose has no migrator service). When a
# migration is introduced, run it explicitly — see docs/DEPLOYMENT.md.
# ─────────────────────────────────────────────────────────────

name: Deploy to Vultr

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

# Never let two deploys rebuild the same container concurrently.
concurrency:
  group: deploy-vultr
  cancel-in-progress: false

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # Advisory only: there are pre-existing react-hooks / no-explicit-any
      # errors. They are surfaced here but must not block the deploy.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      # Advisory: surfaced but does NOT block deploys (maintainer preference —
      # next.config also sets typescript.ignoreBuildErrors so `next build` won't
      # fail either). Watch the annotations to keep type debt from growing.
      - name: Type Check (advisory)
        run: npx tsc --noEmit
        continue-on-error: true

  deploy:
    name: Build & Deploy (Docker)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Rebuild & restart the live container over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/root/server/contractorcalc

            echo "── Fast-forward build context to origin/main ──"
            cd "$APP_DIR/src"
            git fetch --prune origin main
            git reset --hard origin/main
            echo "Now at: $(git rev-parse --short HEAD) — $(git log -1 --pretty=%s)"

            echo "── Build image (old container keeps running if this fails) ──"
            cd "$APP_DIR"
            docker compose build app

            echo "── Recreate container ──"
            docker compose up -d app
            docker image prune -f

            echo "── Live container ──"
            docker compose ps app

  notify:
    name: Post-Deploy
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deploy Status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
          fi
