# ─────────────────────────────────────────────────────────────
# GitHub Actions — iOS Build Check
# ─────────────────────────────────────────────────────────────
#
# Trigger: push to `main` / PRs touching iOS-related files, or manual dispatch.
#
# Architecture note: the iOS app is a NATIVE SHELL that loads the web app from
# https://probuildcalc.com (capacitor.config.ts -> server.url, webDir "public").
# There is NO static export, so there is NO `build:ios` step. Capacitor uses
# Swift Package Manager (CapApp-SPM), not CocoaPods, so there is NO .xcworkspace
# — the Xcode project (App.xcodeproj) is built directly.
#
# This check validates that the Capacitor iOS integration stays intact
# (`cap sync` resolves config + native plugins + SPM) and best-effort compiles
# the project. Actual App Store submission is done manually from Xcode.
# ─────────────────────────────────────────────────────────────

name: iOS Build Check

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "capacitor.config.ts"
      - "ios/**"
      - "package.json"
  pull_request:
    paths:
      - "src/**"
      - "capacitor.config.ts"
      - "ios/**"
  workflow_dispatch: # Allow manual trigger

jobs:
  ios-build-check:
    name: Verify iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Capacitor 8 CLI requires Node >= 22
          cache: "npm"

      - run: npm ci

      # Core check: validate the Capacitor iOS integration (config + native
      # plugins + SPM resolution). webDir "public" already exists in the repo;
      # the real web app loads from the server, so there is no static export.
      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      # Best-effort native compile. Capacitor (SPM) builds App.xcodeproj
      # directly — there is no .xcworkspace. Advisory because a strict gate
      # would require a committed shared scheme; this still surfaces compile
      # breakage without false-failing every push.
      - name: Build iOS (no signing, advisory)
        continue-on-error: true
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tail -30
